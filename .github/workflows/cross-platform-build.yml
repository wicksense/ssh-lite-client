name: Cross-platform Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  package-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux artifacts
        run: npm run package:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssh-lite-client-linux
          path: |
            release/*.AppImage
            release/*.deb

  package-macos:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned macOS artifacts
        run: npm run package:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ssh-lite-client-macos
          path: |
            release/*.dmg
            release/*.zip
